<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classical Mechanics — Cheatsheet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #03050d;
  --panel: #0c1226;
  --panel-border: #1a2540;
  --panel-hover: #111b35;
  --accent-blue: #4a9eff;
  --accent-gold: #f0b942;
  --accent-teal: #38d9c0;
  --accent-red: #ff6b6b;
  --text-primary: #e8edf8;
  --text-secondary: #7a8aab;
  --text-muted: #3d4f6e;
}
html { scroll-behavior: smooth; }
body { font-family: 'Space Grotesk', sans-serif; background: var(--void); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

#starfield { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.nebula { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
.nebula-1 { width:600px;height:600px;top:-200px;left:-150px;background:radial-gradient(ellipse,rgba(42,80,180,.18) 0%,transparent 70%); }
.nebula-2 { width:500px;height:500px;top:40%;right:-180px;background:radial-gradient(ellipse,rgba(80,30,160,.14) 0%,transparent 70%); }
.nebula-3 { width:400px;height:400px;bottom:-100px;left:30%;background:radial-gradient(ellipse,rgba(20,100,120,.12) 0%,transparent 70%); }

#veil { position:fixed;inset:0;background:var(--void);z-index:200;opacity:0;pointer-events:none;transition:opacity .32s ease; }
#veil.show { opacity:1;pointer-events:all; }

.view { position:relative;z-index:1;display:none;opacity:0;transform:translateY(10px);transition:opacity .38s ease,transform .38s ease; }
.view.active { display:block;opacity:1;transform:translateY(0); }

.page { max-width:1100px;margin:0 auto;padding:0 2rem 6rem; }

/* ── HOME ── */
header { padding:4rem 0 3rem;border-bottom:1px solid var(--panel-border);margin-bottom:3rem;position:relative;overflow:visible; }
.header-eyebrow { font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-teal);margin-bottom:1rem; }
h1 { font-family:'Space Mono',monospace;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:.75rem; }
h1 .accent { color:var(--accent-blue); }
.header-subtitle { font-size:15px;color:var(--text-secondary);font-weight:300;max-width:480px; }
#orbit-canvas { position:absolute;right:-20px;top:50%;transform:translateY(-52%);pointer-events:none; }

.section-label { font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1.25rem; }

.chapter-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem; }
.chapter-btn {
  position:relative;display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;
  background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;
  cursor:pointer;text-align:left;color:var(--text-primary);font-family:'Space Grotesk',sans-serif;
  transition:background .2s,border-color .2s,transform .15s;overflow:hidden;
}
.chapter-btn::before { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(74,158,255,.06) 0%,transparent 60%);opacity:0;transition:opacity .25s; }
.chapter-btn:hover { background:var(--panel-hover);border-color:rgba(74,158,255,.4);transform:translateY(-2px); }
.chapter-btn:hover::before { opacity:1; }
.chapter-btn:active { transform:translateY(0); }
.chapter-btn.ready { border-color:rgba(74,158,255,.25); }
.chapter-btn.ready:hover { border-color:rgba(74,158,255,.55); }

.btn-icon { flex-shrink:0;width:42px;height:42px;border-radius:10px;background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.2);display:flex;align-items:center;justify-content:center; }
.btn-icon svg { width:20px;height:20px; }
.btn-text { flex:1; }
.btn-title { font-size:15px;font-weight:500;margin-bottom:3px;line-height:1.2; }
.btn-desc { font-size:12px;color:var(--text-secondary);font-weight:300;line-height:1.4; }
.btn-arrow { flex-shrink:0;color:var(--text-muted);font-size:18px;transition:color .2s,transform .2s; }
.chapter-btn:hover .btn-arrow { color:var(--accent-blue);transform:translateX(3px); }
.btn-tag {
  position:absolute;top:10px;right:10px;font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:20px;
}
.btn-tag.soon { background:rgba(56,217,192,.1);border:1px solid rgba(56,217,192,.25);color:var(--accent-teal); }
.btn-tag.live { background:rgba(74,158,255,.12);border:1px solid rgba(74,158,255,.3);color:var(--accent-blue); }

footer { margin-top:4rem;padding-top:1.5rem;border-top:1px solid var(--panel-border);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap; }
.footer-mono { font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.08em; }
.footer-dot { width:5px;height:5px;border-radius:50%;background:var(--accent-teal);display:inline-block;margin-right:8px;animation:pdot 2.5s ease-in-out infinite; }
@keyframes pdot { 0%,100%{opacity:1}50%{opacity:.3} }

/* ════════════════════════════
   CHAPTER PAGE
════════════════════════════ */
.chapter-topbar { display:flex;align-items:center;justify-content:space-between;padding:2rem 0 1.5rem;border-bottom:1px solid var(--panel-border);margin-bottom:3rem;gap:1rem; }
.home-btn { display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--panel-border);border-radius:8px;padding:7px 14px;color:var(--text-secondary);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:border-color .2s,color .2s,background .2s;flex-shrink:0; }
.home-btn:hover { border-color:rgba(74,158,255,.4);color:var(--accent-blue);background:rgba(74,158,255,.05); }
.home-btn svg { width:14px;height:14px; }
.chapter-topbar-meta { text-align:right; }
.chapter-number { font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px; }
.chapter-title-top { font-family:'Space Mono',monospace;font-size:15px;font-weight:700; }

.chapter-hero { margin-bottom:2.5rem; }
.chapter-hero-eyebrow { font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-teal);margin-bottom:.75rem; }
.chapter-hero h2 { font-family:'Space Mono',monospace;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;line-height:1.15;margin-bottom:.6rem; }
.chapter-hero p { font-size:14px;color:var(--text-secondary);font-weight:300;max-width:620px;line-height:1.7; }

/* ── F = ma HERO BOX ── */
.fma-hero {
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(74,158,255,.08) 0%,rgba(74,158,255,.03) 100%);
  border:1px solid rgba(74,158,255,.3);border-radius:16px;
  padding:2.5rem 2rem;margin-bottom:3rem;position:relative;overflow:hidden;
  text-align:center;
}
.fma-hero::before {
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:70%;height:1px;background:linear-gradient(90deg,transparent,rgba(74,158,255,.5),transparent);
}
.fma-hero::after {
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:70%;height:1px;background:linear-gradient(90deg,transparent,rgba(74,158,255,.5),transparent);
}
.fma-label { font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--accent-blue);opacity:.7;margin-bottom:1rem; }
.fma-equation {
  font-family:'Space Mono',monospace;font-size:clamp(3rem,8vw,5.5rem);font-weight:700;
  letter-spacing:.05em;color:var(--text-primary);line-height:1;margin-bottom:1rem;
}
.fma-equation .eq-f { color:var(--accent-blue); }
.fma-equation .eq-m { color:var(--accent-gold); }
.fma-equation .eq-a { color:var(--accent-teal); }
.fma-equation .eq-op { color:var(--text-muted);margin:0 .15em; }
.fma-sub { font-size:13px;color:var(--text-secondary);max-width:420px;line-height:1.6; }
.fma-legend { display:flex;gap:1.5rem;margin-top:1.25rem;flex-wrap:wrap;justify-content:center; }
.fma-leg-item { font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted); }
.fma-leg-item span { font-weight:700; }
.fma-leg-item .lf { color:var(--accent-blue); }
.fma-leg-item .lm { color:var(--accent-gold); }
.fma-leg-item .la { color:var(--accent-teal); }

/* ── CONTENT SECTIONS ── */
.content-section { margin-bottom:2.5rem; }
.content-section-title {
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--accent-teal);margin-bottom:1.25rem;padding-bottom:.6rem;
  border-bottom:1px solid var(--panel-border);
}

.cards-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:0; }

.info-card {
  background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;
  padding:1.4rem 1.5rem;position:relative;overflow:hidden;
  transition:border-color .2s;
}
.info-card:hover { border-color:rgba(74,158,255,.25); }
.info-card-title {
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:.05em;color:var(--text-primary);margin-bottom:.8rem;
}
.info-card-body { font-size:13px;color:var(--text-secondary);line-height:1.7; }
.info-card-body strong { color:var(--text-primary);font-weight:500; }

/* Law cards — coloured left border */
.law-card { border-left:2px solid var(--accent-blue); }
.law-card.gold { border-left-color:var(--accent-gold); }
.law-card.teal { border-left-color:var(--accent-teal); }

/* Formula pill */
.formula-pill {
  display:inline-block;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;
  background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.2);
  border-radius:6px;padding:3px 10px;color:var(--accent-blue);margin:.3rem .15rem .1rem;
}
.formula-pill.gold { background:rgba(240,185,66,.08);border-color:rgba(240,185,66,.2);color:var(--accent-gold); }
.formula-pill.teal { background:rgba(56,217,192,.08);border-color:rgba(56,217,192,.2);color:var(--accent-teal); }

/* Vector / scalar table */
.def-table { width:100%;border-collapse:collapse;font-size:13px; }
.def-table th { font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-weight:400;padding:.5rem .75rem;border-bottom:1px solid var(--panel-border);text-align:left; }
.def-table td { padding:.6rem .75rem;border-bottom:1px solid rgba(26,37,64,.6);color:var(--text-secondary);vertical-align:top;line-height:1.6; }
.def-table td:first-child { color:var(--text-primary);font-weight:500;white-space:nowrap; }
.def-table tr:last-child td { border-bottom:none; }

/* Note block */
.note-block {
  background:rgba(240,185,66,.06);border:1px solid rgba(240,185,66,.18);border-radius:10px;
  padding:1rem 1.25rem;margin-top:1rem;font-size:13px;color:var(--text-secondary);line-height:1.65;
}
.note-block strong { color:var(--accent-gold);font-weight:500; }

/* Chapter footnav */
.chapter-footnav { display:flex;align-items:center;justify-content:space-between;padding-top:1.5rem;border-top:1px solid var(--panel-border);gap:1rem; }
.nav-arrow-btn { display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;padding:10px 18px;color:var(--text-secondary);font-family:'Space Grotesk',sans-serif;font-size:13px;cursor:pointer;transition:border-color .2s,color .2s,background .2s,transform .15s;min-width:140px; }
.nav-arrow-btn:hover { border-color:rgba(74,158,255,.35);color:var(--text-primary);background:var(--panel-hover);transform:translateY(-1px); }
.nav-arrow-btn:active { transform:translateY(0); }
.nav-arrow-btn.disabled { opacity:.25;cursor:default;pointer-events:none; }
.nav-arrow-btn.prev { justify-content:flex-start; }
.nav-arrow-btn.next { justify-content:flex-end; }
.arrow-label { flex:1; }
.nav-arrow-btn.next .arrow-label { text-align:right; }
.nav-chapter-indicator { font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.1em; }

@media(max-width:640px){
  #orbit-canvas{display:none;}
  .fma-equation{font-size:3rem;}
  .chapter-topbar{flex-wrap:wrap;}
  .chapter-topbar-meta{text-align:left;}
  .nav-arrow-btn .arrow-label{display:none;}
  .nav-arrow-btn{min-width:auto;}
}

/* ══════════════════════════════════
   CHECKPOINT BUTTONS
══════════════════════════════════ */
.checkpoint-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-top:1.25rem; }
.checkpoint-btn {
  position:relative;display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;
  background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;
  cursor:pointer;text-align:left;color:var(--text-primary);font-family:'Space Grotesk',sans-serif;
  transition:background .2s,border-color .2s,transform .15s;overflow:hidden;
}
.checkpoint-btn::before { content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s; }
.checkpoint-btn.quiz::before { background:linear-gradient(135deg,rgba(240,185,66,.07) 0%,transparent 60%); }
.checkpoint-btn.methods::before { background:linear-gradient(135deg,rgba(56,217,192,.07) 0%,transparent 60%); }
.checkpoint-btn.practice::before { background:linear-gradient(135deg,rgba(74,158,255,.07) 0%,transparent 60%); }
.checkpoint-btn:hover::before { opacity:1; }
.checkpoint-btn.quiz:hover { background:var(--panel-hover);border-color:rgba(240,185,66,.4);transform:translateY(-2px); }
.checkpoint-btn.methods:hover { background:var(--panel-hover);border-color:rgba(56,217,192,.4);transform:translateY(-2px); }
.checkpoint-btn.practice:hover { background:var(--panel-hover);border-color:rgba(74,158,255,.4);transform:translateY(-2px); }
.checkpoint-btn:active { transform:translateY(0); }
.checkpoint-btn .btn-icon.quiz-icon { background:rgba(240,185,66,.1);border-color:rgba(240,185,66,.25); }
.checkpoint-btn .btn-icon.quiz-icon svg { color:var(--accent-gold); }
.checkpoint-btn .btn-icon.methods-icon { background:rgba(56,217,192,.1);border-color:rgba(56,217,192,.25); }
.checkpoint-btn .btn-icon.methods-icon svg { color:var(--accent-teal); }
.checkpoint-btn .btn-icon.practice-icon { background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.2); }
.checkpoint-btn .btn-icon.practice-icon svg { color:var(--accent-blue); }
.checkpoint-btn .btn-arrow { flex-shrink:0;color:var(--text-muted);font-size:18px;transition:color .2s,transform .2s; }
.checkpoint-btn.quiz:hover .btn-arrow { color:var(--accent-gold);transform:translateX(3px); }
.checkpoint-btn.methods:hover .btn-arrow { color:var(--accent-teal);transform:translateX(3px); }
.checkpoint-btn.practice:hover .btn-arrow { color:var(--accent-blue);transform:translateX(3px); }
.btn-tag.checkpoint { background:rgba(240,185,66,.1);border:1px solid rgba(240,185,66,.28);color:var(--accent-gold); }
.btn-tag.class test { background:rgba(56,217,192,.08);border:1px solid rgba(56,217,192,.25);color:var(--accent-teal); }

/* ══════════════════════════════════
   QUIZ PAGE
══════════════════════════════════ */
.quiz-sticky-header { position:sticky;top:0;z-index:50;background:var(--void);padding:.85rem 0 .6rem;margin-bottom:1.75rem;border-bottom:1px solid var(--panel-border); }
.quiz-sticky-top { display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem;gap:1rem; }
.quiz-counter { font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--text-secondary); }
.quiz-score-live { font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--text-muted); }
.quiz-score-live span { color:var(--accent-gold); }
.quiz-progress-bar { height:3px;background:var(--panel-border);border-radius:2px;overflow:hidden; }
.quiz-progress-fill { height:100%;background:linear-gradient(90deg,var(--accent-gold),var(--accent-teal));border-radius:2px;transition:width .45s ease; }
.quiz-card { background:var(--panel);border:1px solid var(--panel-border);border-radius:16px;padding:2rem;transition:border-color .3s; }
.quiz-card.answered-correct { border-color:rgba(56,217,192,.45); }
.quiz-card.answered-wrong { border-color:rgba(255,107,107,.4); }
.quiz-q-label { font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.9rem; }
.quiz-q-text { font-size:15px;font-weight:500;line-height:1.6;margin-bottom:1.5rem; }
.quiz-options { display:flex;flex-direction:column;gap:.65rem; }
.quiz-opt {
  display:flex;align-items:center;gap:.85rem;padding:.8rem 1.1rem;
  background:rgba(255,255,255,.03);border:1px solid var(--panel-border);border-radius:10px;
  cursor:pointer;font-size:13.5px;text-align:left;color:var(--text-primary);
  font-family:'Space Grotesk',sans-serif;transition:background .15s,border-color .15s,transform .1s;
}
.quiz-opt:hover:not(.disabled) { background:rgba(255,255,255,.07);border-color:rgba(74,158,255,.35);transform:translateX(3px); }
.quiz-opt.correct { background:rgba(56,217,192,.12);border-color:rgba(56,217,192,.5);color:var(--accent-teal); }
.quiz-opt.wrong { background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.4);color:#ff8080; }
.quiz-opt.reveal-correct { background:rgba(56,217,192,.07);border-color:rgba(56,217,192,.3);color:var(--accent-teal); }
.quiz-opt.disabled { cursor:default;pointer-events:none; }
.quiz-opt-letter { width:26px;height:26px;border-radius:7px;background:var(--panel-border);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0;transition:background .15s,color .15s; }
.quiz-opt.correct .quiz-opt-letter { background:var(--accent-teal);color:#03050d; }
.quiz-opt.wrong .quiz-opt-letter { background:#ff6b6b;color:#03050d; }
.quiz-opt.reveal-correct .quiz-opt-letter { background:rgba(56,217,192,.45);color:var(--accent-teal); }
.quiz-feedback { margin-top:1.1rem;font-size:13px;line-height:1.6;padding:.75rem 1.1rem;border-radius:9px;display:none; }
.quiz-feedback.show { display:block; }
.quiz-feedback.correct { background:rgba(56,217,192,.09);color:var(--accent-teal);border:1px solid rgba(56,217,192,.25); }
.quiz-feedback.wrong { background:rgba(255,107,107,.08);color:#ff8080;border:1px solid rgba(255,107,107,.25); }
.quiz-next-btn {
  width:100%;margin-top:1.25rem;padding:.85rem 1.5rem;
  background:rgba(74,158,255,.09);border:1px solid rgba(74,158,255,.3);border-radius:10px;
  color:var(--accent-blue);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;
  cursor:pointer;transition:background .2s,border-color .2s,transform .12s;display:none;
}
.quiz-next-btn.show { display:block; }
.quiz-next-btn:hover { background:rgba(74,158,255,.16);border-color:rgba(74,158,255,.55);transform:translateY(-1px); }
.quiz-next-btn:active { transform:translateY(0); }
.quiz-score-panel {
  background:linear-gradient(135deg,rgba(240,185,66,.08),rgba(56,217,192,.05));
  border:1px solid rgba(240,185,66,.25);border-radius:16px;padding:2.5rem 2rem;
  text-align:center;display:none;
}
.quiz-score-panel.show { display:block; }
.quiz-score-big { font-family:'Space Mono',monospace;font-size:3.5rem;font-weight:700;color:var(--accent-gold);line-height:1; }
.quiz-score-denom { font-family:'Space Mono',monospace;font-size:1.5rem;color:var(--text-secondary); }
.quiz-score-label { font-size:13px;color:var(--text-secondary);margin-top:.5rem;margin-bottom:1.5rem; }
.quiz-score-bar-wrap { max-width:260px;margin:0 auto 1.75rem;height:5px;background:var(--panel-border);border-radius:3px;overflow:hidden; }
.quiz-score-bar-fill { height:100%;background:linear-gradient(90deg,var(--accent-gold),var(--accent-teal));border-radius:3px;transition:width .7s ease; }
.quiz-retry-btn {
  background:rgba(240,185,66,.12);border:1px solid rgba(240,185,66,.35);border-radius:9px;
  padding:.7rem 1.75rem;color:var(--accent-gold);font-family:'Space Mono',monospace;
  font-size:12px;letter-spacing:.08em;cursor:pointer;transition:background .2s,border-color .2s;
}
.quiz-retry-btn:hover { background:rgba(240,185,66,.22);border-color:rgba(240,185,66,.6); }



/* ══════════════════════════════════
   EXAM PRACTICE PAGE (stub CSS)
══════════════════════════════════ */
.exam-q-block { background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:1.75rem;margin-bottom:1.25rem; }

<script>

const CHAPTERS = [

    status: 'live',
    render: renderChapter3
  }
];

/* ═══════════════════════════════════════
   CHAPTER 1 CONTENT
═══════════════════════════════════════ */
function renderChapter1() {
  return `
    <!-- F = ma HERO -->
    <div class="fma-hero">
      <div class="fma-label">Newton's Second Law · The Central Equation</div>
      <div class="fma-equation">
        <span class="eq-f">F</span><span class="eq-op">=</span><span class="eq-m">m</span><span class="eq-a">a</span>
      </div>
      <div class="fma-sub">Any change in velocity is caused by a force. Massive bodies have more inertia and require larger forces to change their motion.</div>
      <div class="fma-legend">
        <div class="fma-leg-item"><span class="lf">F</span> — Force (vector, N)</div>
        <div class="fma-leg-item"><span class="lm">m</span> — Mass (scalar, kg)</div>
        <div class="fma-leg-item"><span class="la">a</span> — Acceleration (vector, ms⁻²)</div>
      </div>
    </div>

    <!-- KINEMATICS -->
    <div class="content-section">
      <div class="content-section-title">// Position, Velocity & Acceleration</div>
      <div class="info-card" style="max-width:560px">
        <div class="info-card-body" style="line-height:2.1">
          <span class="formula-pill">s = (x, y, z)</span> &nbsp;position vector<br>
          <span class="formula-pill">v = ds/dt</span> &nbsp;velocity &nbsp;<span style="color:var(--text-muted);font-size:12px">— speed is |v|, a scalar</span><br>
          <span class="formula-pill">a = dv/dt = d²s/dt²</span> &nbsp;acceleration
        </div>
      </div>
    </div>

    <!-- NEWTON'S LAWS -->
    <div class="content-section">
      <div class="content-section-title">// Newton's Three Laws</div>
      <div class="cards-grid">

        <div class="info-card law-card">
          <div class="info-card-title">First Law — Inertia</div>
          <div class="info-card-body">
            An object remains in its current state of motion unless acted upon by a net force.<br><br>
            • A <strong>stationary object</strong> remains stationary.<br>
            • A <strong>moving object</strong> continues at the same velocity — same speed, same direction.<br><br>
            This property is called <strong>inertia</strong>. It explains why an arrow keeps moving after leaving the bow.
          </div>
        </div>

        <div class="info-card law-card gold">
          <div class="info-card-title">Second Law — F = ma</div>
          <div class="info-card-body">
            Forces cause acceleration. The net force on an object equals its mass times its acceleration.<br><br>
            <span class="formula-pill">F = ma</span><br><br>
            This year we focus mostly on <strong>conservative forces</strong> (e.g. gravity) which have an associated potential energy. Friction is mostly neglected.
          </div>
        </div>

        <div class="info-card law-card teal">
          <div class="info-card-title">Third Law — Action & Reaction</div>
          <div class="info-card-body">
            For every force there is an equal and opposite force. Forces are always paired.<br><br>
            <span class="formula-pill teal">F&#x2090;&#x2099; = −F&#x2099;&#x2090;</span><br><br>
            If A exerts force on B, B exerts an equal force back on A — same magnitude, opposite direction. In a closed system, all third-law pairs cancel, so the total force sums to zero.
          </div>
        </div>

      </div>
    </div>

    <!-- MOMENTUM -->
    <div class="content-section">
      <div class="content-section-title">// Momentum</div>
      <div class="cards-grid">

        <div class="info-card">
          <div class="info-card-title">Definition</div>
          <div class="info-card-body">
            Momentum is mass times velocity — a vector quantity:<br><br>
            <span class="formula-pill">p = mv</span><br><br>
            Newton's Second Law can be restated as:<br>
            <span class="formula-pill">F = dp/dt</span>
          </div>
        </div>

        <div class="info-card">
          <div class="info-card-title">Conservation of Momentum</div>
          <div class="info-card-body">
            In a closed system (no external forces), total momentum is conserved — it does not change with time.<br><br>
            <span class="formula-pill teal">Σ pᵢ = Σ mᵢvᵢ = constant</span><br><br>
            This follows directly from combining Newton's 2nd and 3rd Laws.
          </div>
        </div>

      </div>
    </div>

    <!-- COLLISIONS -->
    <div class="content-section">
      <div class="content-section-title">// Collisions</div>
      <div class="cards-grid">

        <div class="info-card law-card">
          <div class="info-card-title">Elastic Collision</div>
          <div class="info-card-body">
            Both momentum <em>and</em> kinetic energy are conserved.<br><br>
            <span class="formula-pill">Σp before = Σp after</span><br>
            <span class="formula-pill">ΣKE before = ΣKE after</span><br><br>
            where &nbsp;<span class="formula-pill">KE = ½mv²</span>
          </div>
        </div>

        <div class="info-card law-card gold">
          <div class="info-card-title">Inelastic Collision</div>
          <div class="info-card-body">
            Momentum is conserved, but kinetic energy is <em>not</em> — some is converted to heat, sound, or deformation.<br><br>
            <span class="formula-pill">Σp before = Σp after</span><br>
            <span class="formula-pill gold">ΣKE before ≠ ΣKE after</span>
          </div>
        </div>

        <div class="info-card law-card teal">
          <div class="info-card-title">Perfectly Inelastic</div>
          <div class="info-card-body">
            Objects stick together after collision — maximum KE loss for a given momentum change.<br><br>
            <span class="formula-pill teal">mv = (M + m)u</span><br><br>
            where u is the common final velocity.
          </div>
        </div>

      </div>
    </div>

    <!-- MASS -->
    <div class="content-section">
      <div class="content-section-title">// Mass vs Weight</div>
      <div class="cards-grid">

        <div class="info-card">
          <div class="info-card-title">Mass</div>
          <div class="info-card-body">
            The <strong>inertia</strong> of an object — how hard it is to change its state of motion. Mass is constant regardless of location.<br><br>
            An object on the Moon has the <em>same mass</em> as on Earth — it is equally hard to accelerate.
          </div>
        </div>

        <div class="info-card">
          <div class="info-card-title">Weight</div>
          <div class="info-card-body">
            Weight is the <strong>gravitational force</strong> acting on a mass:<br><br>
            <span class="formula-pill gold">W = mg</span><br><br>
            Mass is constant regardless of location. Weight depends on the local gravitational field.
          </div>
        </div>

      </div><!-- end cards-grid -->
    </div><!-- end discrete/definition grid -->

    <!-- Continuous body — full width -->
    <div style="margin-bottom:1rem">
      <div class="info-card law-card gold">
        <div class="info-card-title">Continuous Body</div>
        <div class="info-card-body" style="line-height:2.2">
          For a solid object with density ρ(x, y, z):<br>
          <span class="formula-pill gold">M = ∭ ρ dV</span> &nbsp;total mass<br>
          <span class="formula-pill gold">x<sub>CM</sub> = (1/M) ∭ x ρ dV</span><br>
          <span class="formula-pill gold">y<sub>CM</sub> = (1/M) ∭ y ρ dV</span><br>
          <span class="formula-pill gold">z<sub>CM</sub> = (1/M) ∭ z ρ dV</span>
        </div>
      </div>
    </div>

    <!-- CIRCULAR MOTION -->
    <div class="content-section">
      <div class="content-section-title">// Motion in a Circle</div>
      <div class="info-card" style="max-width:560px">
        <div class="info-card-title">Constant Speed, Changing Velocity</div>
        <div class="info-card-body">
          An object moving in a circle at constant speed is <em>still accelerating</em> — its direction continuously changes. This centripetal acceleration is directed towards the centre and requires a net inward force.
        </div>
      </div>
    </div>

    <!-- CENTRE OF MASS -->
    <div class="content-section">
      <div class="content-section-title">// Centre of Mass</div>

      <div class="cards-grid" style="margin-bottom:1rem">
        <div class="info-card">
          <div class="info-card-title">Definition</div>
          <div class="info-card-body">
            The point that moves simply under Newton's Laws — use it to define position, velocity, and acceleration for extended or asymmetric bodies.<br><br>
            Total mass: &nbsp;<span class="formula-pill">M = Σ mᵢ</span>
          </div>
        </div>

        <div class="info-card law-card">
          <div class="info-card-title">Discrete Masses</div>
          <div class="info-card-body">
            For a collection of point masses:<br><br>
            <span class="formula-pill">s<sub>CM</sub> = (1/M) Σ mᵢsᵢ</span><br><br>
            Always closer to the heavier mass.
          </div>
        </div>
      </div>

      <!-- Continuous body — full width -->
      <div class="info-card law-card gold" style="margin-bottom:1rem">
        <div class="info-card-title">Continuous Body — density ρ(x, y, z)</div>
        <div class="info-card-body" style="line-height:2.3">
          <span class="formula-pill gold">M = ∭ ρ dV</span>&nbsp; total mass<br>
          <span class="formula-pill gold">x<sub>CM</sub> = (1/M) ∭ x ρ dV</span><br>
          <span class="formula-pill gold">y<sub>CM</sub> = (1/M) ∭ y ρ dV</span><br>
          <span class="formula-pill gold">z<sub>CM</sub> = (1/M) ∭ z ρ dV</span>
        </div>
      </div>

      <div class="cards-grid">
        <div class="info-card law-card teal">
          <div class="info-card-title">Motion of the CM</div>
          <div class="info-card-body">
            In a closed system the centre of mass moves at constant velocity — internal forces cannot shift its trajectory. Total momentum of the whole system remains conserved.
          </div>
        </div>
      </div>
    </div>

    <!-- ENERGY -->
    <div class="content-section">
      <div class="content-section-title">// Energy</div>
      <div class="cards-grid" style="margin-bottom:1rem">

        <div class="info-card law-card">
          <div class="info-card-title">Kinetic Energy</div>
          <div class="info-card-body">
            Energy due to motion. Symbol <strong>T</strong> (or KE):<br><br>
            <span class="formula-pill">T = ½mv²</span>
          </div>
        </div>

        <div class="info-card law-card gold">
          <div class="info-card-title">Potential Energy</div>
          <div class="info-card-body">
            Energy depending on position. Symbol <strong>V</strong>:<br><br>
            <span class="formula-pill gold">V = mgz</span>&nbsp; gravity (near Earth's surface)<br><br>
            <span class="formula-pill gold">V = ½k(x − x₀)²</span>&nbsp; spring
          </div>
        </div>

        <div class="info-card law-card teal">
          <div class="info-card-title">Force from Potential</div>
          <div class="info-card-body">
            A potential drives objects from high to low V:<br><br>
            <span class="formula-pill teal">F = −∇V</span><br><br>
            i.e. &nbsp;Fₓ = −∂V/∂x,&nbsp; F_y = −∂V/∂y,&nbsp; F_z = −∂V/∂z
          </div>
        </div>

        <div class="info-card law-card">
          <div class="info-card-title">Work</div>
          <div class="info-card-body">
            Work is the transfer of energy via force over displacement:<br><br>
            <span class="formula-pill">W = ∫ F · dl</span><br><br>
            F and dl are both vectors — only the component of force along the displacement does work.
          </div>
        </div>

      </div>

      <!-- Conservation — full width -->
      <div class="info-card law-card teal">
        <div class="info-card-title">Conservation of Energy</div>
        <div class="info-card-body" style="line-height:2.3">
          With no friction and no external forces, total mechanical energy is constant:<br>
          <span class="formula-pill teal">E = T + V = ½mv² + V(x,y,z) = constant</span><br>
          <span class="formula-pill teal">dE/dt = 0</span>
        </div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════
   CHAPTER 2 CONTENT — Lagrangian Mechanics
═══════════════════════════════════════ */
function renderChapter2() {
  return `
    <!-- CALCULUS OF VARIATIONS -->
    <div class="content-section">
      <div class="content-section-title">// Calculus of Variations</div>
      <div class="cards-grid" style="margin-bottom:1rem">

        <div class="info-card">
          <div class="info-card-title">The Problem</div>
          <div class="info-card-body">
            Find the curve y(x) with fixed endpoints (x₀, y₀) and (x_f, y_f) that maximises or minimises a functional:<br><br>
            <span class="formula-pill">I = ∫ f(y, y′, x) dx</span><br><br>
            where y′ = dy/dx.
          </div>
        </div>

        <div class="info-card">
          <div class="info-card-title">Arc Length</div>
          <div class="info-card-body">
            The length of a curve y(x) — a key example of a functional:<br><br>
            <span class="formula-pill">dl = √(1 + y′²) dx</span><br><br>
            <span class="formula-pill">L = ∫ √(1 + y′²) dx</span>
          </div>
        </div>

      </div>

      <!-- Euler-Lagrange — full width -->
      <div class="info-card law-card teal" style="margin-bottom:1rem">
        <div class="info-card-title">The Euler-Lagrange Equation</div>
        <div class="info-card-body" style="line-height:2.2">
          A path y(x) is stationary (extremises I) if and only if:<br>
          <span class="formula-pill teal">∂f/∂y − d/dx (∂f/∂y′) = 0</span><br>
          This is a differential equation for the optimal path, holding for all x ∈ (x₀, x_f).
        </div>
      </div>

      <div class="cards-grid">
        <div class="info-card">
          <div class="info-card-title">Result — Shortest Path</div>
          <div class="info-card-body">
            Applying Euler-Lagrange to arc length gives y′ = constant, confirming the shortest path between two points is a straight line:<br><br>
            <span class="formula-pill">y = A + Cx</span>
          </div>
        </div>

        <div class="info-card law-card gold">
          <div class="info-card-title">The Brachistochrone (Cycloid)</div>
          <div class="info-card-body">
            A classic variational problem: find the curve of <em>fastest descent</em> between two points under gravity. The answer is not a straight line but a <strong>cycloid</strong> — also called the brachistochrone. First solved by Bernoulli (1696), it was a founding problem of the calculus of variations.
          </div>
        </div>
      </div>
    </div>

    <!-- PRINCIPLE OF LEAST ACTION -->
    <div class="content-section">
      <div class="content-section-title">// Principle of Least Action</div>

      <div class="cards-grid" style="margin-bottom:1rem">

        <div class="info-card law-card">
          <div class="info-card-title">The Lagrangian</div>
          <div class="info-card-body">
            The Lagrangian function L is kinetic energy minus potential energy:<br><br>
            <span class="formula-pill">L = T − V</span><br><br>
            For a 1D particle: &nbsp;<span class="formula-pill">L = ½mẋ² − V(x)</span>
          </div>
        </div>

        <div class="info-card law-card gold">
          <div class="info-card-title">The Action</div>
          <div class="info-card-body">
            The action S is the time integral of the Lagrangian:<br><br>
            <span class="formula-pill gold">S = ∫ L dt = ∫ (T − V) dt</span><br><br>
            Hamilton's Principle: particles move along the path that keeps S stationary (minimised).
          </div>
        </div>

      </div>

      <!-- Euler-Lagrange in mechanics — full width -->
      <div class="info-card law-card teal" style="margin-bottom:1rem">
        <div class="info-card-title">Euler-Lagrange → Newton's Second Law</div>
        <div class="info-card-body" style="line-height:2.2">
          Applying the Euler-Lagrange equation to the action recovers F = ma:<br>
          <span class="formula-pill teal">d/dt (∂L/∂ẋ) − ∂L/∂x = 0</span><br>
          <span class="formula-pill teal">mẍ = −∂V/∂x = Fₓ</span><br>
          Minimising action ⟺ F = ma &nbsp;(for conservative forces)
        </div>
      </div>

      <div class="info-card">
        <div class="info-card-title">Extension to 3D</div>
        <div class="info-card-body" style="line-height:2.1">
          In 3D with L(x, ẋ, y, ẏ, z, ż, t), one Euler-Lagrange equation applies per coordinate:<br><br>
          <span class="formula-pill">d/dt(∂L/∂ẋ) − ∂L/∂x = 0</span><br>
          <span class="formula-pill">d/dt(∂L/∂ẏ) − ∂L/∂y = 0</span><br>
          <span class="formula-pill">d/dt(∂L/∂ż) − ∂L/∂z = 0</span>
        </div>
      </div>
    </div>

    <!-- REDUCED MASS -->
    <div class="content-section">
      <div class="content-section-title">// Reduced Mass</div>

      <div class="cards-grid" style="margin-bottom:1rem">

        <div class="info-card law-card">
          <div class="info-card-title">Two-Particle Lagrangian</div>
          <div class="info-card-body" style="line-height:2.1">
            For two masses joined by a spring:<br>
            <span class="formula-pill">T = ½m₁ẋ₁² + ½m₂ẋ₂²</span><br>
            <span class="formula-pill">V = ½K(x₂ − x₁)²</span><br>
            Each particle yields its own Euler-Lagrange equation.
          </div>
        </div>

        <div class="info-card law-card gold">
          <div class="info-card-title">Centre of Mass</div>
          <div class="info-card-body" style="line-height:2.1">
            Adding the two equations of motion gives conservation of momentum:<br>
            <span class="formula-pill gold">p₁ + p₂ = constant</span><br>
            and the centre of mass moves at constant velocity:<br>
            <span class="formula-pill gold">x<sub>CM</sub> = (m₁x₁ + m₂x₂) / (m₁ + m₂) = a + bt</span>
          </div>
        </div>

      </div>

      <!-- Reduced mass definition — full width -->
      <div class="info-card law-card teal" style="margin-bottom:1rem">
        <div class="info-card-title">Reduced Mass</div>
        <div class="info-card-body" style="line-height:2.3">
          The separation x₂ − x₁ obeys simple harmonic motion with an effective mass:<br>
          <span class="formula-pill teal">m<sub>red</sub> = m₁m₂ / (m₁ + m₂)</span><br>
          <span class="formula-pill teal">ω² = K / m<sub>red</sub></span><br>
          The reduced mass is always less than either individual mass: &nbsp;<span class="formula-pill teal">m<sub>red</sub> &lt; m₁, m₂</span>
        </div>
      </div>

      <div class="info-card">
        <div class="info-card-title">Example — Hydrogen Isotopes</div>
        <div class="info-card-body" style="line-height:2.1">
          An electron of mass m bound to a nucleus of mass M behaves as a single particle with reduced mass. For the three isotopes of hydrogen (nucleus masses M, 2M, 3M):<br><br>
          <span class="formula-pill">m<sub>H</sub> = Mm/(M+m)</span><br>
          <span class="formula-pill">m<sub>D</sub> = 2Mm/(2M+m)</span><br>
          <span class="formula-pill">m<sub>T</sub> = 3Mm/(3M+m)</span><br><br>
          Different reduced masses → different energy levels → slightly different spectral frequencies.
        </div>
      </div>
    </div>

    <!-- POLAR COORDINATES -->
    <div class="content-section">
      <div class="content-section-title">// Lagrangian Mechanics in Polar Coordinates</div>

      <div class="cards-grid" style="margin-bottom:1rem">

        <div class="info-card">
          <div class="info-card-title">Polar Coordinates</div>
          <div class="info-card-body" style="line-height:2.1">
            Useful for systems with rotational symmetry:<br>
            <span class="formula-pill">x = r cosθ</span><br>
            <span class="formula-pill">y = r sinθ</span>
          </div>
        </div>

        <div class="info-card law-card">
          <div class="info-card-title">Velocity in Polar Coordinates</div>
          <div class="info-card-body" style="line-height:2.1">
            Decompose into radial and azimuthal components:<br>
            <span class="formula-pill">v<sub>r</sub> = ṙ</span> &nbsp;(radial)<br>
            <span class="formula-pill">v<sub>θ</sub> = rθ̇</span> &nbsp;(azimuthal)<br>
            <span class="formula-pill">v² = ṙ² + r²θ̇²</span>
          </div>
        </div>

      </div>

      <!-- Lagrangian in polar — full width -->
      <div class="info-card law-card teal" style="margin-bottom:1rem">
        <div class="info-card-title">Lagrangian & Equations of Motion</div>
        <div class="info-card-body" style="line-height:2.3">
          <span class="formula-pill teal">L = ½mṙ² + ½mr²θ̇² − V(r,θ)</span><br>
          Radial equation: &nbsp;<span class="formula-pill teal">mṙ̈ − mrθ̇² = −∂V/∂r</span><br>
          Angular equation: &nbsp;<span class="formula-pill teal">d/dt [mr²θ̇] = −∂V/∂θ</span>
        </div>
      </div>

      <div class="info-card law-card gold">
        <div class="info-card-title">Central Potential & Angular Momentum</div>
        <div class="info-card-body" style="line-height:2.1">
          When V depends only on r (not θ), the angular equation gives a conserved quantity:<br><br>
          <span class="formula-pill gold">d/dt [mr²θ̇] = 0</span><br>
          <span class="formula-pill gold">J = mr²θ̇ = constant</span><br><br>
          J is the <strong>angular momentum</strong> — conserved for any central potential.
        </div>
      </div>
    </div>
  `;
}

          <div class="info-card-body" style="line-height:2.1">

            <span class="formula-pill">r(θ) = l / (1 + e cosθ)</span><br><br>
            Physical range: −θ∞ &lt; θ &lt; θ∞ where <span class="formula-pill">θ∞ = cos⁻¹(−1/e)</span><br>

          </div>

            <span class="formula-pill gold">e = 1.1995</span> &nbsp;·&nbsp; <span class="formula-pill gold">a = −1.280 AU</span><br>
            <span class="formula-pill gold">l = 0.562 AU</span> &nbsp;·&nbsp; <span class="formula-pill gold">r<sub>min</sub> = 0.255 AU</span><br><br>
            e &gt; 1 and a &lt; 0 confirm an unbound escape orbit.
          </div>
        </div>

        <div class="info-card">
          <div class="info-card-title">Rutherford Scattering (Repulsive)</div>
          <div class="info-card-body" style="line-height:2.1">

            <span class="formula-pill">r(θ) = C / (e cosθ − 1)</span> &nbsp;(e ≥ 1)<br><br>
            Physical where cosθ &gt; 1/e. The nucleus sits at the <em>other</em> focus compared to the attractive case.
          </div>
        </div>

      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════
   STARFIELD
═══════════════════════════════════════ */
(function(){
  const c=document.getElementById('starfield'), x=c.getContext('2d'); let s=[];
  function resize(){
    c.width=window.innerWidth; c.height=Math.max(document.documentElement.scrollHeight,window.innerHeight);
    s=[]; const n=Math.floor(c.width*c.height/4200);
    for(let i=0;i<n;i++) s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()<.05?Math.random()*1.3+.8:Math.random()<.25?Math.random()*.7+.4:Math.random()*.5+.2,a:Math.random()*.55+.1,tw:Math.random()<.2,ph:Math.random()*Math.PI*2,sp:.3+Math.random()*.8});
  }
  function draw(t){
    x.clearRect(0,0,c.width,c.height); const now=t/1000;
    for(const p of s){ const a=p.tw?p.a*(.5+.5*Math.sin(now*p.sp+p.ph)):p.a; x.beginPath(); x.arc(p.x,p.y,p.r,0,Math.PI*2); x.fillStyle=`rgba(210,225,255,${a})`; x.fill(); }
    requestAnimationFrame(draw);
  }
  resize(); window.addEventListener('resize',resize); requestAnimationFrame(draw);
})();

/* ── Orbit animation ── */
(function(){
  const c=document.getElementById('orbit-canvas'), x=c.getContext('2d');
  const W=240,H=240,cx=120,cy=120,R=100;
  function draw(t){
    x.clearRect(0,0,W,H);
    x.beginPath(); x.arc(cx,cy,R,0,Math.PI*2); x.strokeStyle='rgba(74,158,255,0.18)'; x.lineWidth=1; x.stroke();
    const sg=x.createRadialGradient(cx-4,cy-4,2,cx,cy,18);
    sg.addColorStop(0,'#ffe080'); sg.addColorStop(.5,'#f0b942'); sg.addColorStop(1,'#b07010');
    x.beginPath(); x.arc(cx,cy,18,0,Math.PI*2); x.fillStyle=sg; x.fill();
    x.beginPath(); x.arc(cx,cy,24,0,Math.PI*2); x.fillStyle='rgba(240,185,66,0.12)'; x.fill();
    const angle=(t/1000)*(Math.PI*2/8);
    const px=cx+R*Math.cos(angle), py=cy+R*Math.sin(angle);
    const pg=x.createRadialGradient(px-2,py-2,1,px,py,7);
    pg.addColorStop(0,'#90c8ff'); pg.addColorStop(.5,'#4a9eff'); pg.addColorStop(1,'#1a4a90');
    x.beginPath(); x.arc(px,py,7,0,Math.PI*2); x.fillStyle=pg; x.fill();
    x.beginPath(); x.arc(px,py,11,0,Math.PI*2); x.fillStyle='rgba(74,158,255,0.14)'; x.fill();
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

let curChapter=0;
const veil=document.getElementById('veil');
const viewHome=document.getElementById('view-home');
const viewChapter=document.getElementById('view-chapter');
const chapterInner=document.getElementById('chapter-page-inner');

const ALL_VIEWS = [viewHome, viewChapter,
  document.getElementById('view-quiz'),
  document.getElementById('view-methods'),
  document.getElementById('view-practice')
];

function transition(fn){ veil.classList.add('show'); setTimeout(()=>{ fn(); setTimeout(()=>veil.classList.remove('show'),50); },300); }

function goHome(){
  transition(()=>{
    ALL_VIEWS.forEach(v=>{ v.classList.remove('active'); v.style.display='none'; });
    viewHome.style.display='block'; requestAnimationFrame(()=>viewHome.classList.add('active'));
    window.scrollTo({top:0,behavior:'instant'});
  });
}

function goChapter(idx){
  curChapter=idx;
  const ch=CHAPTERS[idx];
  const pad=n=>String(n+1).padStart(2,'0');
  const prevDisabled = idx===0 ? 'disabled' : '';
  const nextDisabled = idx===CHAPTERS.length-1 ? 'disabled' : '';
  const prevLabel = idx===0 ? 'Previous' : CHAPTERS[idx-1].title;
  const nextLabel = idx===CHAPTERS.length-1 ? 'Next' : CHAPTERS[idx+1].title;

  chapterInner.innerHTML = `
    <div class="chapter-topbar">
      <button class="home-btn" id="btn-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
        Home
      </button>
      <div class="chapter-topbar-meta">
        <div class="chapter-number">Chapter ${pad(idx)}</div>
        <div class="chapter-title-top">${ch.title}</div>
      </div>
    </div>

    <div class="chapter-hero">
      <p class="chapter-hero-eyebrow">Chapter ${pad(idx)} · Classical Mechanics</p>
      <h2>${ch.title}</h2>
      <p>${ch.desc}</p>
    </div>

    ${ch.render()}

    <div class="chapter-footnav">
      <button class="nav-arrow-btn prev ${prevDisabled}" id="btn-prev">
        <span>&#8592;</span>
        <span class="arrow-label">${prevLabel}</span>
      </button>
      <span class="nav-chapter-indicator">${idx+1} / ${CHAPTERS.length}</span>
      <button class="nav-arrow-btn next ${nextDisabled}" id="btn-next">
        <span class="arrow-label">${nextLabel}</span>
        <span>&#8594;</span>
      </button>
    </div>
  `;

  document.getElementById('btn-home').addEventListener('click', goHome);
  document.getElementById('btn-prev').addEventListener('click', ()=>{ if(curChapter>0) goChapter(curChapter-1); });
  document.getElementById('btn-next').addEventListener('click', ()=>{ if(curChapter<CHAPTERS.length-1) goChapter(curChapter+1); });

  transition(()=>{
    ALL_VIEWS.forEach(v=>{ v.classList.remove('active'); v.style.display='none'; });
    viewChapter.style.display='block'; requestAnimationFrame(()=>viewChapter.classList.add('active'));
    window.scrollTo({top:0,behavior:'instant'});
  });
}

let quizActive = [];
let quizCurrent = 0;
let quizScore = 0;
let quizAnsweredCurrent = false;

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

function openQuiz(){
  quizActive = shuffle(QUIZ_QUESTIONS).slice(0,10);
  quizCurrent = 0;
  quizScore = 0;
  quizAnsweredCurrent = false;
  const qView = document.getElementById('view-quiz');
  const inner = document.getElementById('quiz-page-inner');
  inner.innerHTML = checkpointTopbar('Self Quiz','Test your understanding of concepts from all three chapters. One question at a time.') + `
    <div class="quiz-sticky-header">
      <div class="quiz-sticky-top">
        <span class="quiz-counter" id="quiz-counter">Question 1 of ${quizActive.length}</span>
        <span class="quiz-score-live">Score: <span id="quiz-score-live">0</span> / ${quizActive.length}</span>
      </div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress" style="width:0%"></div></div>
    </div>
    <div id="quiz-card-wrap"></div>
    <div class="quiz-score-panel" id="quiz-score-panel"></div>
  `;
  renderQuizCard();
  showView(qView);
  window.scrollTo({top:0,behavior:'instant'});
}

function renderQuizCard(){
  const q = quizActive[quizCurrent];
  const wrap = document.getElementById('quiz-card-wrap');
  wrap.innerHTML = `
    <div class="quiz-card" id="quiz-card">
      <div class="quiz-q-label">Question ${quizCurrent+1} of ${quizActive.length}</div>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((o,j)=>`
          <button class="quiz-opt" data-a="${j}">
            <span class="quiz-opt-letter">${['A','B','C','D'][j]}</span>${o}
          </button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-fb"></div>
      <button class="quiz-next-btn" id="quiz-next">${quizCurrent===quizActive.length-1?'// See Results':'// Next Question →'}</button>
    </div>
  `;
  quizAnsweredCurrent = false;
  // attach option listeners
  wrap.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.addEventListener('click', function(){
      if(quizAnsweredCurrent) return;
      quizAnsweredCurrent = true;
      const ai = +this.dataset.a;
      const correct = q.ans;
      const isCorrect = ai === correct;
      if(isCorrect) quizScore++;
      // style options
      wrap.querySelectorAll('.quiz-opt').forEach((o,j)=>{
        o.classList.add('disabled');
        if(j===correct) o.classList.add(isCorrect?'correct':'reveal-correct');
        else if(j===ai) o.classList.add('wrong');
      });
      document.getElementById('quiz-card').classList.add(isCorrect?'answered-correct':'answered-wrong');
      const fb = document.getElementById('quiz-fb');
      fb.textContent = q.fb;
      fb.className = `quiz-feedback show ${isCorrect?'correct':'wrong'}`;
      // update header
      document.getElementById('quiz-score-live').textContent = quizScore;
      const pct = (quizCurrent+1)/quizActive.length*100;
      document.getElementById('quiz-progress').style.width = pct+'%';
      document.getElementById('quiz-next').classList.add('show');
    });
  });
  // next button
  document.getElementById('quiz-next').addEventListener('click', ()=>{
    quizCurrent++;
    if(quizCurrent >= quizActive.length){
      showQuizScore();
    } else {
      const wrap = document.getElementById('quiz-card-wrap');
      wrap.style.opacity='0'; wrap.style.transform='translateX(18px)';
      wrap.style.transition='opacity .2s,transform .2s';
      setTimeout(()=>{
        wrap.style.transition='';
        wrap.style.opacity=''; wrap.style.transform='';
        renderQuizCard();
        document.getElementById('quiz-counter').textContent = `Question ${quizCurrent+1} of ${quizActive.length}`;
        window.scrollTo({top:0,behavior:'smooth'});
      },200);
    }
  });
}

function showQuizScore(){
  document.getElementById('quiz-card-wrap').innerHTML='';
  document.getElementById('quiz-progress').style.width='100%';
  const pct = Math.round(quizScore/quizActive.length*100);
  const grade = pct>=90?'Excellent work!':pct>=70?'Well done.':pct>=50?'Good effort.':'Keep reviewing.';
  const panel = document.getElementById('quiz-score-panel');
  panel.innerHTML = `
    <div class="quiz-score-big">${quizScore}<span class="quiz-score-denom">/${quizActive.length}</span></div>
    <div class="quiz-score-label">${grade} You scored ${pct}%.</div>
    <div class="quiz-score-bar-wrap"><div class="quiz-score-bar-fill" id="quiz-score-bar" style="width:0%"></div></div>
    <button class="quiz-retry-btn" onclick="openQuiz()">// New Quiz</button>
  `;
  panel.classList.add('show');
  setTimeout(()=>{ document.getElementById('quiz-score-bar').style.width=pct+'%'; },100);
}

        <div class="info-card-title">Step 2 — Calculate kinetic energies before and after</div>

          <span class="formula-pill">KE = ½mv²  =  ½m(vₓ² + vy²)</span><br>
          Compute KE_before = ½m₁|u₁|² + ½m₂|u₂|² and KE_after = ½m₁|v₁|² + ½m₂|v₂|².
        </div>
      </div>
      <div class="info-card law-card gold">
        <div class="info-card-title">Step 3 — Compare and classify</div>
        <div class="info-card-body" style="line-height:2.1">
          If KE_before = KE_after → <strong>elastic</strong><br>
          If KE_before &gt; KE_after → <strong>inelastic</strong> (energy lost to heat/deformation)<br>
          KE can never increase in a passive collision.

    </div>

    <!-- METHOD 2: Centre of Mass -->
    <div class="content-section">
      <div class="content-section-title">// Method: Centre of Mass</div>
      <div class="info-card law-card teal" style="margin-bottom:1rem">
        <div class="info-card-title">What you are asked to do</div>
        <div class="info-card-body">Find the centre of mass of a 2D lamina with given boundary, or a 1D rod with variable density.</div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">2D Lamina — Step 1: Find total mass M</div>
        <div class="info-card-body" style="line-height:2.1">
          <span class="formula-pill">M = ρ ∫∫ dA = ρ ∫[x bounds] ∫[y bounds] dy dx</span><br>
          Set up the inner integral over y first (from 0 to the curve), then integrate over x.
        </div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">2D Lamina — Step 2: Find x̄ and ȳ</div>
        <div class="info-card-body" style="line-height:2.1">
          <span class="formula-pill">x̄ = (ρ/M) ∫∫ x dA</span> &nbsp;·&nbsp; <span class="formula-pill">ȳ = (ρ/M) ∫∫ y dA</span><br>
          For ȳ, the inner integral over y gives ½y² evaluated at the boundary: ∫₀^{f(x)} y dy = ½[f(x)]².
        </div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">1D Rod with variable density ρ(x)</div>

          <span class="formula-pill">M = ∫₀ᴸ ρ(x) dx</span><br>
          <span class="formula-pill">x̄ = (1/M) ∫₀ᴸ x ρ(x) dx</span><br>

      </div>
      <div class="info-card law-card gold">

        <div class="info-card-title">What you are asked to do</div>
        <div class="info-card-body">Given two (r, θ) points on an orbit, find the eccentricity e, semi-latus rectum l, perihelion/aphelion, period, and energy/momentum at closest approach.</div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">Step 1 — Set up two simultaneous equations</div>
        <div class="info-card-body" style="line-height:2.1">
          Use the polar orbit equation at each observation point:<br>
          <span class="formula-pill">r = l / (1 + e cosθ)</span><br>
          This gives two equations in two unknowns (l and e). Rearrange each to: l = r(1 + e cosθ).
        </div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">Step 2 — Divide equations to eliminate l, solve for e</div>
        <div class="info-card-body" style="line-height:2.1">
          Dividing: r₁(1 + e cosθ₁) = r₂(1 + e cosθ₂)<br>
          Expand and collect e terms: r₁ − r₂ = e(r₂cosθ₂ − r₁cosθ₁)<br>
          <span class="formula-pill">e = (r₁ − r₂) / (r₂cosθ₂ − r₁cosθ₁)</span>
        </div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">Step 3 — Find l, then perihelion and aphelion</div>
        <div class="info-card-body" style="line-height:2.1">
          Back-substitute e into either equation to get l.<br>
          <span class="formula-pill">a = l / (1 − e²)</span> &nbsp;·&nbsp;
          <span class="formula-pill">r_min = a(1−e)</span> &nbsp;·&nbsp;
          <span class="formula-pill">r_max = a(1+e)</span>
        </div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">Step 4 — Period via Kepler III</div>
        <div class="info-card-body" style="line-height:2.1">
          <span class="formula-pill">T² = (4π²/GM) a³</span><br>
          In AU/year units: GM_Sun = 4π² AU³/yr², so <span class="formula-pill">T = a^(3/2) years</span>
        </div>
      </div>
      <div class="info-card law-card gold">
        <div class="info-card-title">Step 5 — Energy, KE, PE, J at perihelion</div>
        <div class="info-card-body" style="line-height:2.1">
          At r_min the velocity is purely tangential (ṙ = 0), so v = rθ̇.<br>
          <span class="formula-pill">PE = −GM_Sun m / r_min</span><br>
          <span class="formula-pill">E = −GM_Sun m / 2a</span> &nbsp;→&nbsp; <span class="formula-pill">KE = E − PE</span><br>
          <span class="formula-pill">J = m√(GM_Sun · l)</span> &nbsp;(from J² = GMm²l for e &lt; 1 orbits)
        </div>
      </div>
    </div>

    <!-- METHOD 4: Lagrangian in 2D -->
    <div class="content-section">
      <div class="content-section-title">// Method: Lagrangian Mechanics in 2D</div>
      <div class="info-card law-card teal" style="margin-bottom:1rem">
        <div class="info-card-title">What you are asked to do</div>
        <div class="info-card-body">Write the Lagrangian, derive equations of motion, prove a conservation law, and solve the EOM for given initial conditions.</div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">Step 1 — Write down T and V, form L = T − V</div>
        <div class="info-card-body" style="line-height:2.1">
          For a particle of mass M in 2D: <span class="formula-pill">T = ½M(ẋ² + ẏ²)</span><br>
          Read V directly from the problem. Form <span class="formula-pill">L = T − V</span>.
        </div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">Step 2 — Apply Euler-Lagrange for each coordinate</div>
        <div class="info-card-body" style="line-height:2.1">
          For x: <span class="formula-pill">∂L/∂x − d/dt(∂L/∂ẋ) = 0</span><br>
          For y: <span class="formula-pill">∂L/∂y − d/dt(∂L/∂ẏ) = 0</span><br>
          This gives two second-order ODEs (the equations of motion).
        </div>
      </div>
      <div class="info-card" style="margin-bottom:.75rem">
        <div class="info-card-title">Step 3 — Prove conservation of a quantity J</div>
        <div class="info-card-body" style="line-height:2.1">
          Compute dJ/dt using the product rule. Substitute the equations of motion to show dJ/dt = 0.<br>
          Then explain <em>why</em>: if V = V(r) = V(x²+y²), the potential is rotationally symmetric → angular momentum is conserved by Noether's theorem.
        </div>
      </div>
      <div class="info-card law-card gold">
        <div class="info-card-title">Step 4 — Solve EOM with initial conditions</div>
        <div class="info-card-body" style="line-height:2.1">
          The EOM will be simple harmonic: <span class="formula-pill">ẍ = −Ω²x</span> and <span class="formula-pill">ÿ = −Ω²y</span><br>
          General solution: <span class="formula-pill">x(t) = A cos(Ωt) + B sin(Ωt)</span><br>
          Apply x(0), ẋ(0) to find A and B for each coordinate separately.
        </div>
      </div>
    </div>
  `;
  showView(document.getElementById('view-methods'));
}

let practiceSetIdx = 0;

function openPractice(){
  practiceSetIdx = 0;
  renderPractice();
  showView(document.getElementById('view-practice'));
}

function renderPractice(){
  const set = PRACTICE_SETS[practiceSetIdx];
  const inner = document.getElementById('practice-page-inner');
  const qs = set.map((q,i)=>`
    <div class="exam-q-block">
      <div class="exam-q-num">${q.num}</div>
      <div class="exam-q-text">${q.q}</div>
      <div class="exam-q-hint">💡 ${q.hint}</div>
      <button class="exam-reveal-btn" id="reveal-${i}" onclick="toggleAnswer(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        Show worked solution
      </button>
      <div class="exam-answer" id="answer-${i}">
        ${q.steps.map((s,j)=>`<div class="step"><span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);margin-right:.5rem">0${j+1}</span>${s}</div>`).join('')}
        <div class="result">∴ &nbsp;${q.result}</div>
      </div>
    </div>
  `).join('');

  inner.innerHTML = checkpointTopbar('Exam Practice','Four questions in exam style. Read the hint, attempt the question, then reveal the worked solution.') + `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem;">
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);">Question Set ${practiceSetIdx+1} of ${PRACTICE_SETS.length}</span>
      <div style="display:flex;gap:.5rem;">
        ${PRACTICE_SETS.map((_,i)=>`<div style="width:28px;height:4px;border-radius:2px;background:${i===practiceSetIdx?'var(--accent-blue)':'var(--panel-border)'};transition:background .2s"></div>`).join('')}
      </div>
    </div>
    ${qs}
    <button class="gen-btn" onclick="cycleSet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.76"/></svg>
      Generate New Questions
    </button>
  `;
}

function cycleSet(){
  practiceSetIdx = (practiceSetIdx + 1) % PRACTICE_SETS.length;
  renderPractice();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleAnswer(i){
  const ans = document.getElementById('answer-'+i);
  const btn = document.getElementById('reveal-'+i);
  const open = ans.classList.toggle('show');
  btn.classList.toggle('open', open);
  btn.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:${open?'rotate(180deg)':'rotate(0)'};transition:transform .25s"><polyline points="6 9 12 15 18 9"/></svg>
    ${open ? 'Hide solution' : 'Show worked solution'}
  `;
}

/* ── Init ── */
viewHome.style.display='block';
requestAnimationFrame(()=>viewHome.classList.add('active'));
</script>
